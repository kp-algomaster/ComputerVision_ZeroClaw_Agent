<text x="431" y="408" font-size="11" font-weight="600" fill="#94a3b8">Core Agent</text>
<text x="431" y="424" font-size="10.5" fill="#64748b">· LangGraph ReAct orchestrator  ·  tool-call decoder</text>
<text x="431" y="439" font-size="10.5" fill="#64748b">· llmfit hardware probe  ·  async streaming WebSocket</text>
<text x="431" y="454" font-size="10.5" fill="#64748b">· ✦ Copilot SDK mode (BYOK Ollama / GitHub token)</text>

<text x="431" y="476" font-size="11" font-weight="600" fill="#94a3b8">Sub-Agents</text>
<text x="431" y="492" font-size="10.5" fill="#64748b">· blog_writer  ·  paper_to_code  ·  data_visualization</text>
<text x="431" y="507" font-size="10.5" fill="#64748b">· model_training  ·  website_maintenance  ·  digest_writer</text>
<text x="431" y="522" font-size="10.5" fill="#64748b">· Each overridable via MODEL_OVERRIDE env var</text>

<text x="431" y="544" font-size="11" font-weight="600" fill="#94a3b8">⚡ Live Playground</text>
<text x="431" y="560" font-size="10.5" fill="#64748b">· Drag-and-drop DAG canvas  ·  WebSocket real-time exec</text>
