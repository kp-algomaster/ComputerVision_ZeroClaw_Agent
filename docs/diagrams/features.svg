<text x="431" y="86" font-size="13" font-weight="700" fill="#a78bfa">⚡  Local AI Inference</text>

<text x="431" y="122" font-size="11" font-weight="600" fill="#94a3b8">Vision Models</text>
<text x="431" y="138" font-size="10.5" fill="#64748b">· Ollama: qwen2.5-vl:7b / :72b  ·  llava:13b  ·  llava-next</text>
<text x="431" y="153" font-size="10.5" fill="#64748b">· MLX (Apple Silicon): qwen2.5-VL-4bit  ·  llava-1.5-7b</text>
<text x="431" y="168" font-size="10.5" fill="#64748b">· SAM 3 segmentation  ·  Apple Neural Engine</text>

<text x="431" y="190" font-size="11" font-weight="600" fill="#94a3b8">LLM</text>
<text x="431" y="206" font-size="10.5" fill="#64748b">· qwen2.5-coder:latest  ·  qwen3-coder:30b</text>
<text x="431" y="221" font-size="10.5" fill="#64748b">· Any Ollama-compatible model  ·  BYOK via .env</text>
<text x="431" y="236" font-size="10.5" fill="#64748b">· llmfit hardware probe → auto model selection</text>

<text x="431" y="258" font-size="11" font-weight="600" fill="#94a3b8">Text → Diagram  (Paperbanana)</text>
<text x="431" y="274" font-size="10.5" fill="#64748b">· 4-phase pipeline: optimizer → planner → visualizer → critic</text>
<text x="431" y="289" font-size="10.5" fill="#64748b">· Iterative refinement loop  ·  output/diagrams/</text>
<text x="431" y="304" font-size="10.5" fill="#64748b">· Providers: Ollama · Gemini · OpenAI · OpenRouter</text>

