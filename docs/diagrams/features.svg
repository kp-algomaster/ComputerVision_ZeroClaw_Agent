<text x="38" y="86" font-size="13" font-weight="700" fill="#60a5fa">🔬  Research Automation</text>

<text x="38" y="122" font-size="11" font-weight="600" fill="#94a3b8">Paper Discovery</text>
<text x="38" y="138" font-size="10.5" fill="#64748b">· Continuous arXiv monitor (cs.CV · cs.AI · cs.LG · cs.RO)</text>
<text x="38" y="153" font-size="10.5" fill="#64748b">· Papers With Code  ·  Semantic Scholar</text>
<text x="38" y="168" font-size="10.5" fill="#64748b">· Configurable keyword queries  ·  PDF fetch &amp; cache</text>

<text x="38" y="190" font-size="11" font-weight="600" fill="#94a3b8">Extraction Pipeline</text>
<text x="38" y="206" font-size="10.5" fill="#64748b">· Multi-faceted: equations · architectures · datasets</text>
<text x="38" y="221" font-size="10.5" fill="#64748b">· Loss functions · metrics · ablation results</text>
<text x="38" y="236" font-size="10.5" fill="#64748b">· Spec generation (Markdown · LaTeX) → vault</text>

<text x="38" y="258" font-size="11" font-weight="600" fill="#94a3b8">Digests</text>
<text x="38" y="274" font-size="10.5" fill="#64748b">· Weekly digest (Monday) via digest_writer agent</text>
<text x="38" y="289" font-size="10.5" fill="#64748b">· Auto-blog via blog_writer sub-agent</text>
<text x="38" y="304" font-size="10.5" fill="#64748b">· Knowledge graph indexing (entities · links · Obsidian)</text>

<!-- ══════════════════════════════════════════════════════════
     Card 2 — Local AI Inference
     ══════════════════════════════════════════════════════════ -->
<rect x="413" y="64" width="375" height="268" rx="8" fill="#0d0d1f" stroke="#1e1e35" stroke-width="1"/>
