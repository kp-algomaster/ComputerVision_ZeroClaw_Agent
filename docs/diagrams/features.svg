<text x="38" y="492" font-size="10.5" fill="#64748b">· HuggingFace Trainer  ·  LoRA / QLoRA support</text>
<text x="38" y="507" font-size="10.5" fill="#64748b">· model_training sub-agent  ·  output/fine-tuned/</text>
<text x="38" y="522" font-size="10.5" fill="#64748b">· paper_to_code agent: paper → training script</text>

<text x="38" y="544" font-size="11" font-weight="600" fill="#94a3b8">Labelling  (Label Studio)</text>
<text x="38" y="560" font-size="10.5" fill="#64748b">· Label Studio ≥ 1.10 embedded at :8080</text>
<text x="38" y="575" font-size="10.5" fill="#64748b">· Auto-import downloaded datasets  ·  YOLO / COCO export</text>
<text x="38" y="590" font-size="10.5" fill="#64748b">· output/.label-studio/  ·  output/labels/</text>

