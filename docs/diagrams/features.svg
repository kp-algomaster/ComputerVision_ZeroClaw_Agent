<text x="824" y="122" font-size="11" font-weight="600" fill="#94a3b8">Knowledge Graph</text>
<text x="824" y="138" font-size="10.5" fill="#64748b">· Obsidian vault  ·  hierarchical markdown notes</text>
<text x="824" y="153" font-size="10.5" fill="#64748b">· Entity types: paper · method · dataset · architecture</text>
<text x="824" y="168" font-size="10.5" fill="#64748b">· Link types: proposes · uses · extends · cites · outperforms</text>

<text x="824" y="190" font-size="11" font-weight="600" fill="#94a3b8">Vault Viewer</text>
<text x="824" y="206" font-size="10.5" fill="#64748b">· Live Markdown render in browser  ·  graph topology</text>
<text x="824" y="221" font-size="10.5" fill="#64748b">· Sync browser tab with Obsidian toggle</text>
<text x="824" y="236" font-size="10.5" fill="#64748b">· Full-text search across all vault nodes</text>

<text x="824" y="258" font-size="11" font-weight="600" fill="#94a3b8">Spec Generator</text>
<text x="824" y="274" font-size="10.5" fill="#64748b">· Paper → structured spec.md (Pydantic schema)</text>
<text x="824" y="289" font-size="10.5" fill="#64748b">· Extract: equations · architectures · training details</text>
<text x="824" y="304" font-size="10.5" fill="#64748b">· Auto-index into knowledge graph on save</text>

