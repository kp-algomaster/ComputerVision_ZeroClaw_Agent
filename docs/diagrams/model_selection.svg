<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" style="font-family:'Inter',system-ui,sans-serif">

<!-- Background -->
<rect width="1100" height="620" fill="#08080f"/>

<!-- Title -->
<text x="550" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#e2e8f0">Hardware-Aware Model Selection  —  llmfit Probe Pipeline</text>
<line x1="80" y1="48" x2="1020" y2="48" stroke="#1e1e35" stroke-width="1"/>

<!-- ── COLUMN 1: Probe chain (left) ── -->

<!-- Agent Startup -->
<rect x="60" y="70" width="148" height="40" rx="20" fill="#1a1a3e" stroke="#4f46e5" stroke-width="1.5"/>
<text x="134" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#a5b4fc">⚡  Agent Startup</text>

<!-- arrow down -->
<line x1="134" y1="110" x2="134" y2="138" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<!-- llmfit Hardware Probe -->
<rect x="44" y="138" width="180" height="52" rx="6" fill="#0f0f2e" stroke="#4f46e5" stroke-width="1.5"/>
<text x="134" y="158" text-anchor="middle" font-size="11" font-weight="700" fill="#818cf8">llmfit probe</text>
<text x="134" y="174" text-anchor="middle" font-size="10" fill="#64748b">CPU · GPU · VRAM · RAM · ANE</text>

<!-- arrow down -->
<line x1="134" y1="190" x2="134" y2="218" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<!-- HW Fingerprint box -->
<rect x="44" y="218" width="180" height="72" rx="6" fill="#0f0f2e" stroke="#334155" stroke-width="1"/>
<text x="134" y="238" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Hardware Fingerprint</text>
<text x="60" y="255" font-size="9.5" fill="#475569">· Apple Silicon / CUDA / CPU-only</text>
<text x="60" y="269" font-size="9.5" fill="#475569">· VRAM tier  ·  RAM available</text>
<text x="60" y="283" font-size="9.5" fill="#475569">· Neural Engine present (ANE)</text>

<!-- arrow down -->
<line x1="134" y1="290" x2="134" y2="318" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<!-- Score & Rank -->
<rect x="44" y="318" width="180" height="62" rx="6" fill="#0f0f2e" stroke="#334155" stroke-width="1"/>
<text x="134" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Score &amp; Rank Models</text>
<text x="60" y="355" font-size="9.5" fill="#475569">· Fit score per model (0–100)</text>
<text x="60" y="369" font-size="9.5" fill="#475569">· VRAM headroom  ·  speed tier</text>

<!-- arrow down -->
<line x1="134" y1="380" x2="134" y2="408" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

<!-- Best Fit decision -->
<polygon points="134,408 196,438 134,468 72,438" fill="#0d1b3e" stroke="#4f46e5" stroke-width="1.5"/>
<text x="134" y="442" text-anchor="middle" font-size="10" font-weight="700" fill="#a5b4fc">Best Fit?</text>

<!-- Yes arrow right -->
<line x1="196" y1="438" x2="260" y2="438" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
<text x="228" y="432" text-anchor="middle" font-size="9" fill="#22c55e">yes</text>

<!-- No arrow down -->
<line x1="134" y1="468" x2="134" y2="496" stroke="#f87171" stroke-width="1.5" marker-end="url(#arr-red)"/>
<text x="148" y="486" font-size="9" fill="#f87171">no</text>

<!-- Fallback -->
<rect x="60" y="496" width="148" height="38" rx="6" fill="#2d1515" stroke="#f87171" stroke-width="1"/>
<text x="134" y="520" text-anchor="middle" font-size="11" font-weight="600" fill="#fca5a5">Config Fallback</text>

<!-- Fallback arrow right (joins main flow) -->
<line x1="208" y1="515" x2="260" y2="515" stroke="#f87171" stroke-width="1.2"/>
<line x1="260" y1="515" x2="260" y2="458" stroke="#f87171" stroke-width="1.2"/>
<line x1="260" y1="458" x2="270" y2="458" stroke="#f87171" stroke-width="1.2" marker-end="url(#arr-red)"/>

<!-- ── COLUMN 2: Model available? ── -->

<!-- Model Available? diamond -->
<polygon points="310,408 382,438 310,468 238,438" fill="#0d1b3e" stroke="#4f46e5" stroke-width="1.5"/>
<text x="310" y="435" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a5b4fc">Model</text>
<text x="310" y="448" text-anchor="middle" font-size="9.5" font-weight="700" fill="#a5b4fc">Pulled?</text>

<!-- Yes arrow right -->
<line x1="382" y1="438" x2="440" y2="438" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
<text x="411" y="432" text-anchor="middle" font-size="9" fill="#22c55e">yes</text>

<!-- No arrow down to auto-pull -->
<line x1="310" y1="468" x2="310" y2="496" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr-amber)"/>
<text x="324" y="486" font-size="9" fill="#fbbf24">no</text>

<!-- Auto-Pull -->
<rect x="232" y="496" width="156" height="38" rx="6" fill="#1c1500" stroke="#fbbf24" stroke-width="1.2"/>
<text x="310" y="520" text-anchor="middle" font-size="11" font-weight="600" fill="#fde68a">ollama pull  (auto)</text>

<!-- Auto-pull arrow right then up to rejoin -->
<line x1="388" y1="515" x2="440" y2="515" stroke="#fbbf24" stroke-width="1.2"/>
<line x1="440" y1="515" x2="440" y2="458" stroke="#fbbf24" stroke-width="1.2"/>
<line x1="440" y1="458" x2="450" y2="458" stroke="#fbbf24" stroke-width="1.2" marker-end="url(#arr-amber)"/>

<!-- ── COLUMN 3: Consumer routing ── -->

<!-- "Selected Model" hub -->
<rect x="450" y="416" width="156" height="44" rx="22" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
<text x="528" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Selected Model</text>
<text x="528" y="454" text-anchor="middle" font-size="9.5" fill="#4ade80">ready to serve</text>

<!-- ── 4 consumer arrows fanning right ── -->
<!-- Chat Agent -->
<line x1="606" y1="432" x2="690" y2="382" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
<!-- Paperbanana -->
<line x1="606" y1="438" x2="690" y2="438" stroke="#f472b6" stroke-width="1.5" marker-end="url(#arr-pink)"/>
<!-- Vision Tools -->
<line x1="606" y1="444" x2="690" y2="494" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arr-sky)"/>
<!-- Sub-Agents -->
<line x1="606" y1="450" x2="690" y2="550" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-orange)"/>

<!-- Consumer boxes -->
<!-- Chat Agent -->
<rect x="690" y="358" width="160" height="48" rx="6" fill="#1a0d3e" stroke="#a78bfa" stroke-width="1.2"/>
<text x="770" y="378" text-anchor="middle" font-size="11" font-weight="600" fill="#c4b5fd">🤖  Chat Agent</text>
<text x="770" y="395" text-anchor="middle" font-size="9.5" fill="#64748b">LangGraph ReAct · tool calls</text>

<!-- Paperbanana -->
<rect x="690" y="414" width="160" height="48" rx="6" fill="#2d0a1e" stroke="#f472b6" stroke-width="1.5"/>
<text x="770" y="434" text-anchor="middle" font-size="11" font-weight="600" fill="#f9a8d4">🍌  Paperbanana</text>
<text x="770" y="451" text-anchor="middle" font-size="9.5" fill="#64748b">VLM critic · code-gen LLM</text>

<!-- Vision Tools -->
<rect x="690" y="470" width="160" height="48" rx="6" fill="#0c1e33" stroke="#38bdf8" stroke-width="1.2"/>
<text x="770" y="490" text-anchor="middle" font-size="11" font-weight="600" fill="#7dd3fc">👁  Vision Tools</text>
<text x="770" y="507" text-anchor="middle" font-size="9.5" fill="#64748b">SAM3 · qwen2.5-vl · llava</text>

<!-- Sub-Agents -->
<rect x="690" y="526" width="160" height="48" rx="6" fill="#1e1500" stroke="#fb923c" stroke-width="1.2"/>
<text x="770" y="546" text-anchor="middle" font-size="11" font-weight="600" fill="#fdba74">🔧  Sub-Agents</text>
<text x="770" y="563" text-anchor="middle" font-size="9.5" fill="#64748b">blog · training · digest · p2c</text>

<!-- ── Paperbanana detail panel ── -->
<rect x="880" y="390" width="190" height="196" rx="8" fill="#0d0d1f" stroke="#f472b6" stroke-width="1"/>
<rect x="880" y="390" width="190" height="28" rx="8" fill="#1a0818"/>
<rect x="880" y="404" width="190" height="14" fill="#1a0818"/>
<text x="975" y="408" text-anchor="middle" font-size="10.5" font-weight="700" fill="#f472b6">Paperbanana  4-Phase Pipeline</text>
<line x1="880" y1="418" x2="1070" y2="418" stroke="#2d1030" stroke-width="1"/>

<text x="896" y="438" font-size="10" font-weight="600" fill="#94a3b8">① optimizer</text>
<text x="896" y="452" font-size="9" fill="#475569">  refines source text intent</text>

<text x="896" y="470" font-size="10" font-weight="600" fill="#94a3b8">② planner  <tspan fill="#f472b6">(VLM)</tspan></text>
<text x="896" y="484" font-size="9" fill="#475569">  layout plan from HW-selected VLM</text>

<text x="896" y="502" font-size="10" font-weight="600" fill="#94a3b8">③ visualizer</text>
<text x="896" y="516" font-size="9" fill="#475569">  matplotlib / imagen code-gen</text>

<text x="896" y="534" font-size="10" font-weight="600" fill="#94a3b8">④ critic  <tspan fill="#f472b6">(VLM)</tspan></text>
<text x="896" y="548" font-size="9" fill="#475569">  iterative refinement × N</text>

<text x="896" y="570" font-size="9.5" fill="#374151">providers: ollama · gemini · openai · openrouter</text>

<!-- arrow from Paperbanana box to detail panel -->
<line x1="850" y1="438" x2="878" y2="490" stroke="#f472b6" stroke-width="1" stroke-dasharray="4,3"/>

<!-- ── Hardware probe detail panel (top right) ── -->
<rect x="880" y="68" width="190" height="200" rx="8" fill="#0d0d1f" stroke="#4f46e5" stroke-width="1"/>
<rect x="880" y="68" width="190" height="28" rx="8" fill="#0f0f2e"/>
<rect x="880" y="82" width="190" height="14" fill="#0f0f2e"/>
<text x="975" y="86" text-anchor="middle" font-size="10.5" font-weight="700" fill="#818cf8">llmfit  Signals</text>
<line x1="880" y1="96" x2="1070" y2="96" stroke="#1e1e40" stroke-width="1"/>

<text x="896" y="116" font-size="10" font-weight="600" fill="#94a3b8">GPU</text>
<text x="950" y="116" font-size="9.5" fill="#475569">CUDA / Metal / None</text>
<text x="896" y="133" font-size="10" font-weight="600" fill="#94a3b8">VRAM</text>
<text x="950" y="133" font-size="9.5" fill="#475569">4 GB / 8 GB / 16 GB+</text>
<text x="896" y="150" font-size="10" font-weight="600" fill="#94a3b8">RAM</text>
<text x="950" y="150" font-size="9.5" fill="#475569">available system memory</text>
<text x="896" y="167" font-size="10" font-weight="600" fill="#94a3b8">ANE</text>
<text x="950" y="167" font-size="9.5" fill="#475569">Apple Neural Engine (MLX)</text>
<text x="896" y="184" font-size="10" font-weight="600" fill="#94a3b8">CPU</text>
<text x="950" y="184" font-size="9.5" fill="#475569">cores · arch (arm64 / x86)</text>

<line x1="880" y1="196" x2="1070" y2="196" stroke="#1e1e40" stroke-width="1"/>
<text x="896" y="212" font-size="9.5" font-weight="600" fill="#94a3b8">Recommended models</text>
<text x="896" y="228" font-size="9" fill="#475569">· 4 GB VRAM → qwen2.5-vl:7b</text>
<text x="896" y="243" font-size="9" fill="#475569">· 8 GB+ VRAM → qwen2.5-vl:72b</text>
<text x="896" y="258" font-size="9" fill="#475569">· ANE → qwen2.5-VL-4bit (MLX)</text>

<!-- dashed connector from probe box to detail panel -->
<line x1="224" y1="164" x2="878" y2="164" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4,3"/>

<!-- ── Legend ── -->
<rect x="60" y="570" width="580" height="36" rx="6" fill="#0d0d1f" stroke="#1e1e35" stroke-width="1"/>
<circle cx="85" cy="588" r="5" fill="#4f46e5"/>
<text x="96" y="592" font-size="9.5" fill="#64748b">probe / select flow</text>
<circle cx="200" cy="588" r="5" fill="#22c55e"/>
<text x="211" y="592" font-size="9.5" fill="#64748b">model ready</text>
<circle cx="290" cy="588" r="5" fill="#f87171"/>
<text x="301" y="592" font-size="9.5" fill="#64748b">fallback path</text>
<circle cx="380" cy="588" r="5" fill="#fbbf24"/>
<text x="391" y="592" font-size="9.5" fill="#64748b">auto-pull</text>
<circle cx="450" cy="588" r="5" fill="#f472b6"/>
<text x="461" y="592" font-size="9.5" fill="#64748b">Paperbanana consumer</text>

<defs>
  <marker id="arr-blue"   markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#4f46e5"/></marker>
  <marker id="arr-green"  markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#22c55e"/></marker>
  <marker id="arr-red"    markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f87171"/></marker>
  <marker id="arr-amber"  markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#fbbf24"/></marker>
  <marker id="arr-purple" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#a78bfa"/></marker>
  <marker id="arr-pink"   markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#f472b6"/></marker>
  <marker id="arr-sky"    markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#38bdf8"/></marker>
  <marker id="arr-orange" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#fb923c"/></marker>
</defs>
</svg>
